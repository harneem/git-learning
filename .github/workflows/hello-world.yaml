name: L2 - ref Override Demo

on:
  push:
    branches:
      - master  

jobs:
  checkout-different-branch:
    runs-on: [self-hosted,linux]
    steps:
      - name: Checkout 'int' branch instead of main
        uses: actions/checkout@v4
        with:
          ref: int          

      - name: Prove we are on int branch
        run: |
          echo "Triggered by push to  : $GITHUB_REF"
          echo "Actually checked out  :"
          git branch          # should show 'int'
          git log --oneline -3